name: kasir_app
description: Aplikasi Kasir & Manajemen Toko
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Database lokal
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Barcode scanner
  mobile_scanner: ^5.1.1

  # Ambil foto barang
  image_picker: ^1.1.2

  # Grafik
  fl_chart: ^0.68.0

  # Format angka & tanggal
  intl: ^0.19.0

  # Pilih file / folder (backup & import)
  file_picker: ^8.0.6

  # Export Excel
  excel: ^4.0.6

  # Export PDF
  pdf: ^3.11.0
  printing: ^5.13.1

  # Share file hasil export
  share_plus: ^9.0.0

  # Simpan pengaturan ringan (PIN, tema, nama toko)
  shared_preferences: ^2.2.3

  # Notifikasi lokal (stok menipis, kedaluwarsa, reminder backup)
  flutter_local_notifications: ^17.2.2

  # UUID untuk nomor transaksi/referensi
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
