name: Build Flutter APK Artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.2"

      - name: Regenerate folder android
        run: |
          rm -rf android
          flutter create --platforms=android --org com.example .

      - name: Tambahkan permission Android
        run: |
          sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />|' android/app/src/main/AndroidManifest.xml

      - name: Aktifkan core library desugaring
        run: |
          sed -i '/compileOptions {/a\        isCoreLibraryDesugaringEnabled = true' android/app/build.gradle.kts
          sed -i 's|minSdk = flutter.minSdkVersion|minSdk = maxOf(flutter.minSdkVersion, 21)|' android/app/build.gradle.kts

          cat >> android/app/build.gradle.kts << 'GRADLE_EOF'

          dependencies {
              coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")
          }
          GRADLE_EOF

      - name: Paksa semua plugin memakai compileSdk 36
        run: |
          cat >> android/build.gradle.kts << 'GRADLE_EOF'

          subprojects {
              afterEvaluate {
                  if (plugins.hasPlugin("com.android.library")) {
                      extensions.findByName("android")?.let { ext ->
                          try {
                              ext.javaClass
                                  .getMethod("setCompileSdk", Int::class.java)
                                  .invoke(ext, 36)
                          } catch (_: Exception) {
                          }
                      }
                  }
              }
          }
          GRADLE_EOF

          echo "===== android/build.gradle.kts ====="
          cat android/build.gradle.kts

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK ke GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Kasir App (Build Terbaru)"
          body: "APK hasil build otomatis dari commit ${{ github.sha }}."
          artifacts: build/app/outputs/flutter-apk/app-release.apk
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}