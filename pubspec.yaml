name: kasir_app
description: Aplikasi Kasir & Manajemen Toko
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.5

  # Database lokal
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # Barcode scanner
  mobile_scanner: ^7.1.2

  # Ambil foto barang
  image_picker: ^1.2.0

  # Grafik
  fl_chart: ^1.1.1

  # Format angka & tanggal
  intl: ^0.20.2

  # Pilih file / folder
  file_picker: ^10.3.2

  # Export Excel
  excel: ^4.0.6

  # Export PDF
  pdf: ^3.11.3
  printing: ^5.14.2

  # Share file
  share_plus: ^12.0.0

  # Pengaturan
  shared_preferences: ^2.5.3

  # Notifikasi
  flutter_local_notifications: ^19.4.1

  # UUID
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true